coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 2%

ignore:
  - "examples/**"
  - "**/*_test.go"
  - "fuzz_test.go"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
