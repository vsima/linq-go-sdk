name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.23'
      - run: go test -race ./...

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Create source archive
        run: git archive --format=tar.gz -o "linq-go-sdk-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_REF_NAME}"

      - name: Generate checksums
        run: sha256sum "linq-go-sdk-${GITHUB_REF_NAME}.tar.gz" > checksums.txt

      - name: Keyless-sign checksums with cosign
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: cosign sign-blob --yes --output-signature checksums.txt.sig --output-certificate checksums.txt.pem checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          generate_release_notes: true
          body_path: ${{ github.workspace }}/CHANGELOG.md
          files: |
            linq-go-sdk-${{ github.ref_name }}.tar.gz
            checksums.txt
            checksums.txt.sig
            checksums.txt.pem

      - name: Prime proxy.golang.org
        run: |
          GOPROXY=proxy.golang.org go list -m github.com/${{ github.repository }}@${{ github.ref_name }} || true
