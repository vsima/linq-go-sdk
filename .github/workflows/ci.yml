name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25', '1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go mod download
      - run: go build ./...
      - name: Test
        shell: bash
        run: go test -race -timeout 120s -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: 'stable'
          cache: true
      - name: FuzzParseEvent
        run: go test -run=^$ -fuzz=FuzzParseEvent -fuzztime=30s .
      - name: FuzzVerifyWebhook
        run: go test -run=^$ -fuzz=FuzzVerifyWebhook -fuzztime=30s .
      - name: FuzzMessagePart
        run: go test -run=^$ -fuzz=FuzzMessagePart -fuzztime=30s .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'
          cache: true
      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files need gofmt:"
            echo "$diff"
            exit 1
          fi
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          version: v2.11.4
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: 'stable'
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
      - run: govulncheck ./...
